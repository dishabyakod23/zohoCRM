# Deploy the API + PostgreSQL on Render, then point Vercel at it via BACKEND_URL.
# https://render.com/docs/blueprint-spec

services:
  - type: web
    name: zoho-crm-api
    runtime: node
    rootDir: backend
    plan: free
    buildCommand: npm install && npm run db:setup
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: zoho-crm-db
          property: connectionString
      - key: FRONTEND_URL
        sync: false
      - key: ENABLE_WEEKLY_REPORTS
        value: "false"

databases:
  - name: zoho-crm-db
    plan: free
    databaseName: zoho_crm
    user: zoho_crm
